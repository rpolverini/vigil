name: Update AWS Status

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and convert AWS status to UTF-8 JSON
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json

          req = urllib.request.Request(
              'https://health.aws.amazon.com/public/currentevents',
              headers={'User-Agent': 'Mozilla/5.0'}
          )
          with urllib.request.urlopen(req) as r:
              raw = r.read()

          try:
              text = raw.decode('utf-16')
          except Exception:
              text = raw.decode('utf-8')

          data = json.loads(text)
          with open('aws-status.json', 'w', encoding='utf-8') as f:
              json.dump(data, f)
          print(f'OK: {len(data)} events written')
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aws-status.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update aws-status.json [skip ci]"
            git push
          fi
